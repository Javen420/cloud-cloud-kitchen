version: '3.8'

services:
  redis:
    image: redis:7-alpine
    env_file: ../.env
    environment:
      # Do not set a password unless redis-server is configured with one
      REDIS_PASSWORD: ""
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management
    env_file: ../.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 10s
      retries: 5

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"     # Proxy (all UI traffic goes here)
      - "8001:8001"     # Admin API (optional, for debugging)
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

#Scenario 1
  payment:
    build:
      context: ..
      dockerfile: atomic-services/payment/Dockerfile
    env_file: ../.env
    ports:
      - "8089:8089"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  pending-orders:
    build:
      context: ..
      dockerfile: atomic-services/pending-orders/Dockerfile
    env_file: ../.env
    environment:
      # Inside Docker, services must use the redis container hostname (not localhost)
      REDIS_ADDR: redis:6379
      # Keep empty unless redis is configured with requirepass
      REDIS_PASSWORD: ""
    ports:
      - "8085:8085"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  new-orders:
    build:
      context: ..
      dockerfile: atomic-services/new-orders/Dockerfile
    env_file: ../.env
    ports:
      - "8082:8082"
    depends_on:
      rabbitmq:
        condition: service_healthy

  order-fulfilment:
    build:
      context: ..
      dockerfile: composite-services/order-fulfilment/Dockerfile
    env_file: ../.env
    environment:
      PENDING_ORDERS_URL: http://pending-orders:8085
      NEW_ORDERS_URL: http://new-orders:8082
      PAYMENT_URL: http://payment:8089
    ports:
      - "8081:8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy


#Scenario 2
  kitchen-assignment:
    build:
      context: ..
      dockerfile: atomic-services/kitchen-assignment/Dockerfile
    env_file: ../.env
    ports:
      - "8091:8091"

#Scenario 3
  eta-calculator:
    build:
      context: ../atomic-services/etaCalculator
    env_file: ../.env
    ports:
      - "8084:8084"
    restart: unless-stopped

#notification

  notifications:
    build:
      context: ..
      dockerfile: atomic-services/notifications/Dockerfile
    env_file: ../.env
    volumes:
      - ../atomic-services/notifications/firebase-service-account.json:/app/firebase-service-account.json:ro
    ports:
      - "8090:8090"
    depends_on:
      rabbitmq:
        condition: service_healthy

#UI
  order:
    image: node:20-alpine
    working_dir: /app
    env_file: ../.env
    volumes:
      - ../UI/OrderUI:/app
      - /app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=5173
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    restart: unless-stopped
