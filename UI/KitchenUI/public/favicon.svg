<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#1a2d4a"/>
  <g
    fill="none"
    stroke="#fff"
    stroke-width="1.85"
    stroke-linecap="round"
    stroke-linejoin="round"
    transform="translate(16 16)"
  >
    <!-- Fork (/) — rounded tines like Lucide / navbar (smooth Q curves from stem head) -->
    <g transform="rotate(45)">
      <path d="M 0 7.5 L 0 -5.2"/>
      <path d="M 0 -5.2 Q -1.9 -7.2 -3 -9.6"/>
      <path d="M 0 -5.2 Q 0 -7.8 0 -10.1"/>
      <path d="M 0 -5.2 Q 1.9 -7.2 3 -9.6"/>
    </g>
    <!-- Knife (\) — blade belly faces LEFT; spine + curved cutting edge -->
    <g transform="rotate(-45)">
      <path d="M 0 -8.9 L 0 1.1 L 0 7.5"/>
      <path d="M 0 -8.9 C -3.4 -7.6 -4.2 -3.2 0 1.1"/>
    </g>
  </g>
</svg>
